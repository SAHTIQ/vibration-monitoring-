<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Vibration Monitoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>
<body>
    <div class="background-animation"></div>
    
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="title">
                    <span class="pulse-icon">📡</span> Multi-Device Vibration Monitoring System
                </h1>
                <p class="subtitle">Real-time Industrial IoT Dashboard</p>
            </div>
        </header>

        <!-- Control Panel -->
        <section class="control-panel">
            <div class="control-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="deviceName" 
                        placeholder="Enter device name (e.g., Motor A, Machine 1)" 
                        class="input-field"
                        autocomplete="off"
                    >
                    <button id="addBtn" class="btn btn-primary">
                        <span class="icon">➕</span> Add New Device
                    </button>
                </div>
            </div>

            <div class="control-section stats-container">
                <div class="stat-box">
                    <span class="stat-label">Total Devices</span>
                    <span class="stat-value" id="totalDevices">0</span>
                </div>
                <div class="stat-box alert-stat">
                    <span class="stat-label">Devices in Alert</span>
                    <span class="stat-value alert" id="alertDevices">0</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">System Status</span>
                    <span class="stat-value" id="systemStatus">🟢 Operational</span>
                </div>
            </div>
        </section>

        <!-- Dashboard Grid -->
        <section class="dashboard">
            <div id="devicesGrid" class="devices-grid">
                <!-- Device cards will be inserted here by JavaScript -->
                <div class="empty-state">
                    <p class="empty-icon">📊</p>
                    <p class="empty-text">No devices added yet. Add your first device to get started!</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2024 Smart Vibration Monitoring System | Real-time IoT Dashboard</p>
        </footer>
    </div>

    <!-- Device Card Template (hidden) -->
    <template id="deviceCardTemplate">
        <div class="device-card" data-device-id="">
            <div class="card-header">
                <div class="device-title-section">
                    <h2 class="device-name"></h2>
                    <span class="device-id"></span>
                </div>
                <button class="btn-delete" title="Delete device">✕</button>
            </div>

            <div class="card-content">
                <!-- Current Vibration Display -->
                <div class="vibration-display">
                    <div class="vibration-label">Current Vibration</div>
                    <div class="vibration-value"></div>
                    <div class="vibration-unit">m/s²</div>
                </div>

                <!-- Status Indicator -->
                <div class="status-section">
                    <div class="status-indicator"></div>
                    <div class="status-text"></div>
                </div>

                <!-- Alert Box -->
                <div class="alert-box"></div>

                <!-- Chart -->
                <div class="chart-container">
                    <canvas class="vibration-chart"></canvas>
                </div>

                <!-- Last 5 Readings -->
                <div class="readings-section">
                    <div class="readings-label">Last 5 Readings</div>
                    <div class="readings-list"></div>
                </div>

                <!-- Statistics -->
                <div class="stats-section">
                    <div class="stat-mini">
                        <span class="stat-mini-label">Max</span>
                        <span class="stat-mini-value max-value">0.00</span>
                    </div>
                    <div class="stat-mini">
                        <span class="stat-mini-label">Avg</span>
                        <span class="stat-mini-value avg-value">0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="script.js"></script>
</body>
</html>
